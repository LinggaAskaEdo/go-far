version: "2"

run:
  timeout: 5m

linters:
  enable:
    # ---- Core ----
    - staticcheck    # Advanced static analysis (now includes the functionality of stylecheck and gosimple)
    - gosec          # Inspects source code for security problems
    - gocritic       # Detects suspicious constructs and style issues
    - govet          # Go's official static analyzer
    - errcheck       # Checks for unchecked errors
    - ineffassign    # Detects ineffectual assignments
    - unused         # Checks for unused constants, variables, functions, and types
    - gocyclo        # Computes cyclomatic complexity of functions

    # ---- Reliability & Concurrency ----
    - noctx          # Detects missing context in HTTP requests
    - exhaustive     # Ensures switch statements on enums are exhaustive
    - durationcheck  # Catches mistakes in time.Duration calculations
    - errorlint      # Enforces error wrapping best practices
    - contextcheck   # Checks context propagation rules
    - predeclared    # Catches shadowing of built-ins (len, new, make, error, etc.)

    # ---- Style & Consistency ----
    - funlen         # Flags functions that are too long
    - gocognit       # Measures cognitive complexity of functions
    - nestif         # Detects deeply nested if statements
    - misspell       # Catches typos in code, comments, and identifiers

    # ---- Modernization ----
    - perfsprint     # Suggests faster alternatives to fmt.Sprintf
    - intrange       # Suggests using for range int where possible
    - modernize      # Suggests modern Go constructs (Go 1.21+)
    - usetesting     # Enforces modern test helpers (t.Setenv, t.TempDir, etc.)

  settings:
    gocyclo:
      min-complexity: 15
      
    govet:
      enable-all: true
      disable:
        - fieldalignment  # fieldalignment is often noisy and may be disabled

    funlen:
      lines: 80           # Maximum number of lines for a function
      statements: 50      # Maximum number of statements for a function
      
    gocognit:
      min-complexity: 20  # Cognitive complexity threshold
      
    nestif:
      min-complexity: 4   # Minimum complexity for a nested `if` to trigger
      
    exhaustive:
      default-signifies-exhaustive: true  # Treat 'default' as exhaustive
        
    perfsprint:
      int-conversion: true   # Suggest `strconv.Itoa` over `fmt.Sprint`
      err-error: true        # Suggest `errors.New` for simple errors

    wrapcheck:
      ignore-package-globs:
        - "encoding/*"
        - "github.com/pkg/*"

    misspell:
      locale: US

    usetesting:
      os-setenv: true
      os-temp-dir: true
      os-mkdir-temp: true
      context-background: true
      context-todo: true

formatters:
  enable:
    - goimports
    - gci
    
  settings:
    gci:
      sections:
        - standard          # Go stdlib (e.g., "fmt", "os")        
        - prefix(go-far)    # Your local packages
        - default           # Third-party (e.g., "github.com/...")
      custom-order: true    # Enforce exact order above

issues:
  max-issues-per-linter: 0
  max-same-issues: 0