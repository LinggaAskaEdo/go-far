server:
  port: 8181
  write_timeout: 10s
  read_timeout: 10s
  idle_timeout: 60s
  shutdown_timeout: 5s
  mode: release # debug, release
  max_body_bytes: 1048576 # 1MB (1 << 20), typical: 1-10MB for REST APIs

logger:
  enabled: true
  level: info # debug, info, warn, error
  format: json # json, console
  output: stdout # stdout, file
  path: ./logs/app.log
  max_size: 100 # megabytes
  max_backups: 7
  max_age: 30 # days
  compress: true # disabled by default

postgres:
  enabled: true
  driver: postgres
  host: localhost
  port: 5432
  user: postgres
  password: ${POSTGRES_DOCKER_PASSWORD}
  dbname: go-far
  sslmode: false
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 1h
  conn_max_idle_time: 30m

redis:
  enabled: true
  network: tcp
  address: "localhost:6379"
  password: ""
  cache_ttl: 60s
  max_retries: 3
  min_retry_backoff: 8ms
  max_retry_backoff: 512ms
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  pool_size: 10
  min_idle_conns: 5
  max_idle_conns: 5
  max_active_conns: 10
  pool_timeout: 30s

queries:
  path: ./etc/queries/

token:
  expired_token: 5m
  expired_refresh_token: 15m

scheduler:
  enabled: true
  jobs:
    user_generator:
      enabled: true
      cron: "0 0 */1 * * *" # Every 1 hour
      batch_size: 5
      min_age: 18
      max_age: 80
    car_generator:
      enabled: true
      cron: "0 */30 * * * *" # Every 30 minutes
      batch_size: 3
      min_year: 2015
      max_year: 2025

middleware:
  public_paths:
    - /health
    - /ready
    - /swagger/
    - /auth/login
    - /auth/register
    - /auth/refresh
  auth_rate_limit:
    command: "3-M"  # 3 requests per minute per IP
    limit: 3
  rate_limiter:
    command: "1-S" # 1 request per second
    limit: 500 # max 500 clients
  role_rate_limit:
    admin:
      command: "1-M"
      limit: 10
    user:
      command: "1-M"
      limit: 5
    guest:
      command: "1-M"
      limit: 1

http:
  app_name: go-far-app
